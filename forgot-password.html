<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - ArepaTool</title>
    <link rel="icon" type="image/x-icon" href="pngs/logo.ico">
    <link rel="stylesheet" href="css/skeleton-theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        .cf-turnstile { display: flex; justify-content: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card animate-fade-in">
            <div class="text-center mb-4">
                <a href="index.html"><img src="pngs/arepalanding.png" alt="ArepaTool" style="width: 70px; margin: 0 auto 1rem;"></a>
                <h3>Recuperar Acceso</h3>
                <p class="text-subtle">Ingresa tu email para recibir un link de reseteo</p>
            </div>

            <div id="statusMessage" class="alert hidden"></div>

            <form id="requestForm">
                <div class="form-group">
                    <label class="form-label">Email Registrado</label>
                    <div class="input-group">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                </div>

                <!-- Cloudflare Turnstile -->
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADcAui1yybCKOv5s" id="forgot-turnstile"></div>

                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <i class="bi bi-send"></i> Enviar Link
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="index.html" class="text-sm text-subtle hover:text-white"><i class="bi bi-arrow-left"></i> Volver al Inicio</a>
            </div>
        </div>
    </div>

    <script>
        const form      = document.getElementById('requestForm');
        const submitBtn = document.getElementById('submitBtn');

        function showStatus(msg, type='info') {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = `alert alert-${type}`;
            el.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();

            const turnstileToken = window.turnstile?.getResponse(document.getElementById('forgot-turnstile'));
            if (!turnstileToken) {
                showStatus('Completa la verificación de seguridad.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border"></span> Enviando...';

            try {
                const res  = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, turnstileToken })
                });
                const data = await res.json();

                if (!res.ok) {
                    showStatus('✗ ' + (data.error || 'Error al enviar email'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-send"></i> Enviar Link';
                    if (window.turnstile) window.turnstile.reset(document.getElementById('forgot-turnstile'));
                    return;
                }

                showStatus('✓ Si el correo está registrado, recibirás un link de recuperación.', 'success');
                form.style.display = 'none';

            } catch (error) {
                console.error(error);
                showStatus('✗ Error de red', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-send"></i> Enviar Link';
            }
        });
    </script>
</body>
</html>
