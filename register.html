<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ArepaTool</title>
    <link rel="icon" type="image/x-icon" href="pngs/logo.ico">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/skeleton-theme.css">
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        .cf-turnstile { display: flex; justify-content: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card animate-fade-in">
            <div class="text-center mb-4">
                <a href="index.html">
                    <img src="pngs/arepalanding.png" alt="ArepaTool" style="width: 220px; height: auto; margin: 0 auto 1.5rem;">
                </a>
                <h3>Crear Cuenta</h3>
                <p class="text-subtle">Únete a la comunidad de ArepaTool</p>
            </div>

            <div id="statusMessage" class="alert hidden"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <div class="input-group">
                        <i class="bi bi-person"></i>
                        <input type="text" id="username" class="form-control" placeholder="Mínimo 3 caracteres" required minlength="3">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-check">
                        <input type="checkbox" id="terms" required>
                        <span class="text-sm text-subtle">Acepto los <a href="#" class="text-primary-400">términos</a> y condiciones</span>
                    </label>
                </div>

                <!-- Cloudflare Turnstile -->
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADcAui1yybCKOv5s" id="register-turnstile"></div>

                <button type="submit" class="btn btn-primary btn-block" id="btnSubmit">
                    <i class="bi bi-person-plus"></i> Crear Cuenta
                </button>
            </form>

            <div class="text-center mt-4 pt-4" style="border-top: 1px solid var(--surface-700);">
                <p class="text-subtle text-sm">¿Olvidaste tu contraseña? <a href="forgot-password.html" class="text-primary-400 font-bold">Recupérala aquí</a></p>
                <div class="mt-2">
                     <a href="index.html" class="text-xs text-subtle hover:text-white"><i class="bi bi-arrow-left"></i> Volver al Inicio</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showStatus(msg, type='info') {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = `alert alert-${type}`;
            el.classList.remove('hidden');
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const email    = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const terms    = document.getElementById('terms').checked;
            const btn      = document.getElementById('btnSubmit');

            if (username.length < 3) return showStatus('Usuario muy corto', 'error');
            if (!email.includes('@'))  return showStatus('Email inválido', 'error');
            if (password.length < 6)  return showStatus('Contraseña muy corta', 'error');
            if (!terms)               return showStatus('Debes aceptar los términos', 'error');

            const turnstileToken = window.turnstile?.getResponse(document.getElementById('register-turnstile'));
            if (!turnstileToken) return showStatus('Completa la verificación de seguridad.', 'error');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border"></span> Procesando...';
            showStatus('Creando cuenta...', 'info');

            try {
                const res  = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, turnstileToken })
                });
                const data = await res.json();

                if (!res.ok) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-person-plus"></i> Crear Cuenta';
                    if (window.turnstile) window.turnstile.reset(document.getElementById('register-turnstile'));
                    return showStatus(data.error || 'Error en registro', 'error');
                }

                showStatus('✓ Cuenta Creada. Contacta a tu distribuidor para activar.', 'success');
                btn.innerHTML = '<i class="bi bi-check-circle"></i> ¡Listo!';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-success');
                setTimeout(() => window.location.href = 'index.html', 3000);

            } catch (e) {
                console.error(e);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus"></i> Crear Cuenta';
                showStatus('Error de red', 'error');
            }
        });
    </script>
</body>
</html>
